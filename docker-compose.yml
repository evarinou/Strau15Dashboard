services:
  dashboard:
    build:
      context: .
    container_name: strau15-dashboard
    ports:
      - "${DASHBOARD_PORT:-3001}:8080"
    restart: unless-stopped
    environment:
      - TZ=Europe/Berlin
      # Pflicht (alte VITE_*-Namen werden als Fallback-Aliase akzeptiert)
      - HA_URL=${HA_URL:-http://strau15machine:8123}
      - HA_TOKEN=${HA_TOKEN:-${VITE_HA_TOKEN}}
      - CHOREQUEST_URL=${CHOREQUEST_URL:-http://strau15machine:8007}
      - CHOREQUEST_TOKEN=${CHOREQUEST_TOKEN:-${VITE_CHOREQUEST_TOKEN}}
      # Phase 2 (optional — fehlende Werte deaktivieren nur das jeweilige Feature)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - IMMICH_URL=${IMMICH_URL:-}
      - IMMICH_API_KEY=${IMMICH_API_KEY:-}
      - VIKUNJA_URL=${VIKUNJA_URL:-}
      - VIKUNJA_TOKEN=${VIKUNJA_TOKEN:-}
      - VIKUNJA_PROJECT=${VIKUNJA_PROJECT:-Strau15}
      - PAPERLESS_URL=${PAPERLESS_URL:-}
      - PAPERLESS_TOKEN=${PAPERLESS_TOKEN:-}
      - BRIEFING_TTL_HOURS=${BRIEFING_TTL_HOURS:-6}
    volumes:
      - dashboard-data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

volumes:
  dashboard-data:
